services:
  db:
    image: postgres:16.9-alpine
    container_name: datafrontier-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datafrontier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-DataFrontier@Dev2026}
      POSTGRES_DB: ${POSTGRES_DB:-datafrontier_shared}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - datafrontier_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datafrontier} -d ${POSTGRES_DB:-datafrontier_shared}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - datafrontier-net

volumes:
  datafrontier_pgdata:
    driver: local

networks:
  datafrontier-net:
    driver: bridge
